name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: skeen-app-project
  REGION: us-central1
  SERVICE: skeen-prod-api
  REGISTRY: us-central1-docker.pkg.dev
  REPO: skeen-docker
  IMAGE: skeen-api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          IMAGE_URI=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=skeen-run-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=300 \
            --set-env-vars="ENVIRONMENT=production,FIRESTORE_DATABASE_ID=skeen-prod,GCS_PROFILE_PHOTOS_BUCKET=skeen-profile-photos,GCS_SCAN_IMAGES_BUCKET=skeen-scan-images,GOOGLE_APPLICATION_CREDENTIALS=/secrets/gac.json" \
            --update-secrets="/secrets/gac.json=SKEEN_GAC:latest" \
            --update-secrets="FIREBASE_WEB_API_KEY=FIREBASE_API_KEY_SECRET:latest"
